apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-deployment
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: mlops-churn-prediction:latest
        imagePullPolicy: IfNotPresent  # Allow pulling if local is completely unlinked, but local usually caught by IfNotPresent
        command: 
          - "mlflow"
          - "ui"
          - "--backend-store-uri"
          - "sqlite:////app/mlflow/mlflow.db"
          - "--default-artifact-root"
          - "/app/mlflow/artifacts"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "5000"
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: mlflow-storage
          mountPath: /app/mlflow
      volumes:
      - name: mlflow-storage
        persistentVolumeClaim:
          claimName: mlflow-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
spec:
  selector:
    app: mlflow
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP  # Internal access only, strictly following the report documentation
